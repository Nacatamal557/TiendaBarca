<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro FC Barcelona</title>
    <link rel="stylesheet" href="/global.css">
    <link rel="stylesheet" href="/login-registro.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
</head>
<body class="registro-page">

<section class="auth-container">
    <div class="auth-card">
        <img src="https://upload.wikimedia.org/wikipedia/en/4/47/FC_Barcelona_%28crest%29.svg" class="auth-logo" alt="Logo Barca">
        <h1>Crear Cuenta</h1>
        <p class="auth-subtitle">Únete a la comunidad culé</p>

        <form id="registerForm" action="/api/registrar" method="POST">
            <div class="input-box">
                <input type="text" id="regName" name="nombre" placeholder="Nombre completo" required>
            </div>
            <div class="input-box">
                <input type="email" id="regEmail" name="email" placeholder="Correo electrónico" required>
            </div>
            <div class="input-box">
                <input type="password" id="regPassword" name="password" placeholder="Contraseña" required>
                <span class="toggle-password" onclick="togglePassword('regPassword', this)">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
                </span>
            </div>
            <div class="input-box">
                <input type="password" id="confirmPassword" name="confirmar_password" placeholder="Confirmar contraseña" required>
                <span class="toggle-password" onclick="togglePassword('confirmPassword', this)">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
                </span>
            </div>
            <button type="submit" class="auth-btn">Registrarse</button>
        </form>

        <div class="auth-footer">
            <a href="/">¿Ya tienes cuenta?</a>
        </div>
    </div>
</section>

<script src="/aut.js"></script>
</body>
</html>
